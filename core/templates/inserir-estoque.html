<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Solidário – Ajuste de Estoque</title>

    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css?v={% now 'U' %}">
    <link rel="stylesheet" href="css/inserir-estoque.css?v={% now 'U' %}">
</head>
<body>

        <!-- ============================================================
    OVERLAY (fecha a sidebar ao clicar fora)
    ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    {% include 'sidebar.html' %}

        <!-- ============================================================
    TOPBAR (sem dropdown)
    ============================================================ -->
    {% include 'topbar.html' with page_title='Entrada de Estoque' %}

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content" id="mainContent">

        <!-- TOAST CONTAINER (global) -->
        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

        <!-- ==================== AJUSTE MANUAL DE ESTOQUE ==================== -->
        <section class="inserir-estoque-container">
            <div class="page-header">
                <div>
                    <h2 class="poppins-bold page-title">Ajuste de Estoque</h2>
                    <p class="poppins-regular page-subtitle">Adicione quantidades manualmente ao estoque. O ajuste será registrado com o seu usuário.</p>
                </div>
                <a href="gestao-estoque.html" class="btn-voltar poppins-semibold">← Voltar</a>
            </div>

            <form id="formEntrada" class="inserir-form" novalidate>
                <div class="itens-section">
                    <h3 class="poppins-semibold section-title">Itens a Ajustar</h3>
                    <div id="listaItens" class="itens-grid"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-salvar-entrada poppins-semibold">Confirmar Ajuste</button>
                </div>
            </form>
        </section>


        <!-- BOTÃO VOLTAR AO TOPO -->
        <button class="fab-button" id="scrollToTopBtn" aria-label="Voltar ao topo">
            <img src="/img/top.png" alt="Ícone de voltar ao topo" class="arrow-top">
        </button>

    </main>

    <!-- ==================== BARRA DE NAVEGAÇÃO MOBILE (BOTTOM) ==================== -->
        <!-- ============================================================
    NAVEGAÇÃO MOBILE INFERIOR
    ============================================================ -->

                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                <line x1="12" y1="22.08" x2="12" y2="12" />
            </svg>
            <span class="nav-label">Estoque</span>
        </a>

        <a href="/familia-listagem.html" class="mobile-nav-item">

                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            <span class="nav-label">Famílias</span>
        </a>

        <a href="/frente-caixa.html" class="mobile-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="4" width="20" height="16" rx="2" ry="2" />

                <line x1="2" y1="10" x2="22" y2="10" />
            </svg>
            <span class="nav-label">Caixa</span>
        </a>

        <a href="/perfil.html" class="mobile-nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span class="nav-label">Perfil</span>
        </a>

    </nav>

    <script src="js/base.js?v={% now 'U' %}" type="module" defer></script>
    <script src="js/inserir-estoque.js?v={% now 'U' %}" type="module"></script>
</body>
</html>
