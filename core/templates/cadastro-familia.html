<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Solidário – Cadastro de Família</title>
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css?v={% now 'U' %}">
    <link rel="stylesheet" href="css/cadastro-familias.css?v={% now 'U' %}">
</head>
<body>

    <!-- OVERLAY MOBILE -->
        <!-- ============================================================
    OVERLAY (fecha a sidebar ao clicar fora)
    ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    {% include 'sidebar.html' %}

        <!-- ============================================================
    TOPBAR (sem dropdown)
    ============================================================ -->
    {% include 'topbar.html' with page_title='Cadastrar Família' %}

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content" id="mainContent">
        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

        <section class="cadastro-familia-container">
            <div class="page-header" style="margin-bottom: 24px;">
                <div>
                    <h2 class="poppins-bold page-title" id="pageTitle">Cadastrar Família</h2>
                    <p class="poppins-regular page-subtitle" id="pageSubtitle">Insira os dados da nova família beneficiária.</p>
                </div>
            </div>

            <div class="form-panel">
                <form id="formFamilia" novalidate>
                    <input type="hidden" id="familiaId">

                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="nomeFamilia">Nome da Família *</label>
                            <input type="text" id="nomeFamilia" class="form-input poppins-regular" placeholder="Ex: Silva, Oliveira, Souza" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="responsavel">Nome Completo do Responsável *</label>
                            <input type="text" id="responsavel" class="form-input poppins-regular" placeholder="Nome completo do responsável da família" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="cpf">CPF do Responsável *</label>
                            <input type="text" id="cpf" class="form-input poppins-regular" placeholder="000.000.000-00" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="nis">NIS (Opcional)</label>
                            <input type="text" id="nis" class="form-input poppins-regular" placeholder="Ex: 00000000000">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="telefone">Telefone *</label>
                            <input type="tel" id="telefone" class="form-input poppins-regular" placeholder="(99) 99999-9999" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="endereco">Endereço *</label>
                            <input type="text" id="endereco" class="form-input poppins-regular" placeholder="Rua, número, bairro" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="numMembros">Número de Integrantes *</label>
                            <input type="number" id="numMembros" class="form-input poppins-regular" min="1" value="1" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="cotaLimite">Limite de Cota Familiar (Itens) *</label>
                            <input type="number" id="cotaLimite" class="form-input poppins-regular" min="1" value="15" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="status">Status</label>
                            <select id="status" class="form-select poppins-medium">
                                <option value="ativo">Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <!-- LGPD consent banner -->
                    <div class="form-group lgpd-section" style="margin-top: 20px; padding: 16px; background: var(--purple-bg); border: 1px solid var(--border-color); border-radius: 8px;">
                        <div style="display: flex; gap: 10px; align-items: flex-start;">
                            <input type="checkbox" id="lgpdConsent" required style="margin-top: 4px;">
                            <label for="lgpdConsent" class="poppins-regular" style="font-size: 13px; color: var(--text-main); line-height: 1.5;">
                                Aceito os termos de proteção de dados. Confirmo que os dados pessoais fornecidos nesta ficha de cadastro serão utilizados estritamente para fins de controle de estoque e de entregas de doações alimentícias do Mercado Solidário, em conformidade com a LGPD.
                            </label>
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 30px; display: flex; gap: 16px; justify-content: flex-end;">
                        <a href="familia-listagem.html" class="btn-cancelar poppins-semibold" style="padding: 14px 28px; background: #EFEAF4; color: var(--purple-primary); border-radius: 8px; text-decoration: none; font-size:14px;">Cancelar</a>
                        <button type="submit" class="btn-salvar poppins-semibold" id="btnSalvar" style="padding: 14px 28px; background: var(--purple-primary); color: #FFF; border-radius: 8px; border:none; font-size:14px; cursor:pointer;">Cadastrar Família</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <script src="js/base.js?v={% now 'U' %}" type="module" defer></script>
    <script src="js/cadastro-familias.js?v={% now 'U' %}" type="module"></script>
</body>
</html>
