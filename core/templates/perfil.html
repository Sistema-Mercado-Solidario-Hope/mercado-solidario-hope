<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Solidário – Perfil</title>

    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css?v={% now 'U' %}">
    <link rel="stylesheet" href="css/perfil.css?v={% now 'U' %}">
</head>
<body>

        <!-- ============================================================
    OVERLAY (fecha a sidebar ao clicar fora)
    ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    {% include 'sidebar.html' %}

        <!-- ============================================================
    TOPBAR (sem dropdown)
    ============================================================ -->
    {% include 'topbar.html' with page_title='Meu Perfil' %}

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="main-content" id="mainContent">

        <!-- TOAST CONTAINER (global) -->
        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

        <!-- ==================== PERFIL DO FUNCIONÁRIO ==================== -->
        <section class="perfil-container">
            <div class="page-header">
                <div>
                    <h2 class="poppins-bold page-title">Meu Perfil</h2>
                    <p class="poppins-regular page-subtitle">Gerencie suas informações pessoais e senha de acesso.</p>
                </div>
            </div>

            <div class="perfil-grid">
                <!-- Card: Avatar e informações básicas -->
                <div class="perfil-card card-avatar">
                    <div class="avatar-section">
                        <h3 class="poppins-bold" id="perfilNome" style="margin-top: 16px;">Funcionário</h3>
                        <span class="poppins-medium badge-cargo" id="perfilCargo">Funcionário</span>
                    </div>
                </div>

                <!-- Card: Dados pessoais -->
                <div class="perfil-card card-dados">
                    <h3 class="poppins-bold card-title">Dados Pessoais</h3>
                    <form id="formDadosPessoais" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="poppins-medium" for="nomeCompleto">Nome completo *</label>
                                <input type="text" id="nomeCompleto" class="form-input poppins-regular" required>
                            </div>
                            <div class="form-group">
                                <label class="poppins-medium" for="email">E‑mail</label>
                                <input type="email" id="email" class="form-input poppins-regular" readonly>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="poppins-medium" for="telefone">Telefone *</label>
                                <input type="tel" id="telefone" class="form-input poppins-regular" required>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-salvar poppins-semibold">Salvar Alterações</button>
                        </div>
                    </form>
                </div>

                <!-- Card: Alterar senha -->
                <div class="perfil-card card-senha">
                    <h3 class="poppins-bold card-title">Alterar Senha</h3>
                    <form id="formSenha" novalidate>
                        <div class="form-group">
                            <label class="poppins-medium" for="senhaAtual">Senha atual *</label>
                            <input type="password" id="senhaAtual" class="form-input poppins-regular" placeholder="••••••••" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="poppins-medium" for="novaSenha">Nova senha *</label>
                                <input type="password" id="novaSenha" class="form-input poppins-regular" placeholder="Mínimo 6 caracteres" minlength="6" required>
                            </div>
                            <div class="form-group">
                                <label class="poppins-medium" for="confirmarSenha">Confirmar nova senha *</label>
                                <input type="password" id="confirmarSenha" class="form-input poppins-regular" placeholder="Repita a nova senha" required>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-salvar poppins-semibold">Atualizar Senha</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>


        <!-- BOTÃO VOLTAR AO TOPO -->
        <button class="fab-button" id="scrollToTopBtn" aria-label="Voltar ao topo">
            <img src="/img/top.png" alt="Ícone de voltar ao topo" class="arrow-top">
        </button>

    </main>
