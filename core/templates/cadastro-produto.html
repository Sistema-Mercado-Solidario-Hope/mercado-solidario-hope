<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Solidário – Cadastrar Produto</title>
    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css?v={% now 'U' %}">
    <link rel="stylesheet" href="css/cadastro-produto.css?v={% now 'U' %}">
</head>
<body>

    <!-- OVERLAY MOBILE -->
        <!-- ============================================================
    OVERLAY (fecha a sidebar ao clicar fora)
    ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    {% include 'sidebar.html' %}

        <!-- ============================================================
    TOPBAR (sem dropdown)
    ============================================================ -->
    {% include 'topbar.html' with page_title='Cadastrar Novo Produto' %}

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content" id="mainContent">
        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

         <section class="product-form">
            <div class="form-page-header">
                <div>
                    <h2 class="poppins-bold form-page-title">Cadastrar Produto</h2>
                    <p class="poppins-regular form-page-subtitle">Insira as informações do novo item para o catálogo de doações.</p>
                </div>
            </div>

            <div class="form-card">
                <form id="formCadastroProduto" novalidate>
                    <!-- Nome do Produto -->
                    <div class="form-group">
                        <label class="poppins-medium" for="nomeProduto">Nome do Produto *</label>
                        <input type="text" id="nomeProduto" class="form-input poppins-regular" placeholder="Ex: Arroz Agulhinha 5kg, Sabonete Corporal" required>
                    </div>

                    <!-- Linha 2: Categoria e Unidade -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="categoria">Categoria *</label>
                            <select id="categoria" class="form-select poppins-medium" required>
                                <option value="">Selecione a categoria</option>
                                <option value="Cereais">Cereais</option>
                                <option value="Leguminosas">Leguminosas</option>
                                <option value="Higiene">Higiene</option>
                                <option value="Proteínas">Proteínas</option>
                                <option value="Limpeza">Limpeza</option>
                                <option value="Outros">Outros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="unidade">Unidade de Medida *</label>
                            <select id="unidade" class="form-select poppins-medium" required>
                                <option value="">Selecione a unidade</option>
                                <option value="kg">Quilogramas (kg)</option>
                                <option value="un">Unidades (un)</option>
                                <option value="L">Litros (L)</option>
                            </select>
                        </div>
                    </div>

                    <!-- Linha 3: Limites de Estoque e Estoque Atual -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="estoqueAtual">Quantidade Atual em Estoque *</label>
                            <input type="number" id="estoqueAtual" class="form-input poppins-regular" min="0" value="0" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="estoqueMinimo">Estoque Mínimo (Alerta) *</label>
                            <input type="number" id="estoqueMinimo" class="form-input poppins-regular" min="0" value="10" required>
                        </div>
                    </div>

                    <!-- Linha 4: Estoque Máximo e Meta -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="poppins-medium" for="estoqueMaximo">Estoque Máximo (Limite) *</label>
                            <input type="number" id="estoqueMaximo" class="form-input poppins-regular" min="1" value="1000" required>
                        </div>
                        <div class="form-group">
                            <label class="poppins-medium" for="metaArrecadacao">Meta de Arrecadação *</label>
                            <input type="number" id="metaArrecadacao" class="form-input poppins-regular" min="0" value="100" required>
                        </div>
                    </div>

                    <!-- Drag & Drop Imagem -->
                    <div class="form-group">
                        <label class="poppins-medium">Imagem do Produto (Opcional)</label>
                        <div class="drop-zone" id="dropZone">
                            <div class="upload-placeholder" id="uploadPlaceholder">
                                <span class="upload-icon" style="font-size:32px;">📷</span>
                                <p class="poppins-medium" style="font-size:13px; color:var(--text-main); margin-top:8px;">Arraste uma foto ou clique para fazer upload</p>
                                <p class="poppins-regular" style="font-size:11px; color:var(--text-muted); margin-top:2px;">Formatos JPG, PNG ou WebP (Máx: 2MB)</p>
                            </div>
                            <div class="upload-preview hidden" id="uploadPreview">
                                <img src="" alt="Prévia da Imagem" id="previewImage" style="max-height:160px; border-radius:8px; object-fit:cover;">
                                <button type="button" class="btn-remove-image poppins-semibold" id="btnRemoveImage" style="margin-top:10px; padding:6px 12px; background:var(--danger); color:#FFF; border:none; border-radius:6px; cursor:pointer; font-size:12px;">Remover Foto</button>
                            </div>
                            <input type="file" id="imagemProduto" accept="image/*" class="form-input hidden">
                        </div>
                    </div>

                    <!-- Banner de LGPD -->
                    <div class="form-group" style="margin-top: 20px; padding: 16px; background: var(--purple-bg); border: 1px solid var(--border-color); border-radius: 8px;">
                        <div style="display: flex; gap: 10px; align-items: flex-start;">
                            <input type="checkbox" id="lgpdConsent" required style="margin-top: 4px;">
                            <label for="lgpdConsent" class="poppins-regular" style="font-size: 13px; color: var(--text-main); line-height: 1.5;">
                                Declaro que os dados fornecidos neste cadastro de produto são verídicos e serão integrados ao inventário oficial do Mercado Solidário.
                            </label>
                        </div>
                    </div>

                    <!-- Ações -->
                    <div class="form-actions" style="margin-top: 30px; display: flex; gap: 16px; justify-content: flex-end;">
                        <button type="button" class="btn-cancelar poppins-semibold" id="btnResetForm" style="padding: 14px 28px; background: #EFEAF4; color: var(--purple-primary); border:none; border-radius: 8px; font-size:14px; cursor:pointer;">Limpar</button>
                        <button type="submit" class="btn-salvar poppins-semibold" style="padding: 14px 28px; background: var(--purple-primary); color: #FFF; border-radius: 8px; border:none; font-size:14px; cursor:pointer;">Cadastrar Produto</button>
                    </div>
                </form>
            </div>
        </section>

    </main>

    <script src="js/base.js?v={% now 'U' %}" type="module" defer></script>
    <script src="js/cadastro-produto.js?v={% now 'U' %}" type="module"></script>
</body>
</html>
