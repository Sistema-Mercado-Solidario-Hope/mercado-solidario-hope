<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Solidário – Metas de Arrecadação</title>

    <!-- Fontes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css?v=3">
    <link rel="stylesheet" href="css/visao-geral-estoque.css?v=3">
    <style>
        /* ── table spacing ── */
        .estoque-table thead th {
            padding: 14px 20px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .estoque-table tbody td {
            padding: 16px 20px;
            font-size: 14px;
            vertical-align: middle;
        }
        /* ── meta input + unit inline ── */
        .input-unit-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .meta-edit-input {
            width: 110px;
            min-height: 38px;
            padding: 6px 12px;
            border: 1px solid #d0c2d7;
            border-radius: 8px;
            font-family: "Poppins", sans-serif;
            font-size: 14px;
            outline: none;
            background-color: var(--purple-light);
            color: var(--text-dark);
            transition: border-color 0.2s;
        }
        .meta-edit-input:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 3px rgba(138, 25, 214, 0.1);
        }
        .meta-unit-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .btn-action-save {
            padding: 8px 20px;
            background-color: var(--purple-primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-family: "Poppins", sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-action-save:hover { background-color: var(--purple-dark); }
        .btn-action-save:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- OVERLAY MOBILE -->
        <!-- ============================================================
    OVERLAY (fecha a sidebar ao clicar fora)
    ============================================================ -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    {% include 'sidebar.html' %}

        <!-- ============================================================
    TOPBAR (sem dropdown)
    ============================================================ -->
    {% include 'topbar.html' with page_title='Definição de Metas' %}

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content" id="mainContent">
        <div class="toast-container" id="toastContainer" aria-live="polite"></div>

        <section class="dashboard-content">
            <div class="page-header" style="margin-bottom: 24px;">
                <div>
                    <h1 class="poppins-bold">Metas de Arrecadação</h1>
                    <p class="poppins-regular">Defina metas mensais para calcular deficits e progresso na vitrine pública do Mercado Solidário.</p>
                </div>
            </div>

            <div class="table-panel" style="background:#FFF; padding:24px; border-radius:12px; border:1px solid var(--border-color);">
                <div class="table-header" style="margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
                    <input type="search" id="searchMetas" class="poppins-regular" placeholder="Buscar produto..." style="padding:10px 16px; border:1px solid var(--border-color); border-radius:8px; width:320px; outline:none;">
                    <span class="poppins-medium" id="totalMetasText" style="color:var(--text-muted); font-size:14px;">Carregando produtos...</span>
                </div>

                <div class="table-responsive">
                    <table class="estoque-table" style="width:100%; border-collapse:collapse; text-align:left;">
                        <thead>
                            <tr style="border-bottom: 2px solid var(--border-color);">
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Estoque Atual</th>
                                <th style="min-width:200px;">Meta Mensal</th>
                                <th style="width:130px;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="metasTableBody">
                            <!-- Preenchido via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script src="js/base.js?v=3" type="module" defer></script>
    <script src="js/metas-produtos.js?v=3" type="module"></script>
</body>
</html>
